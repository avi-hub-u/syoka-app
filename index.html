<style>
  :root {
    --wall: #18120e;
    --wall-2: #110c09;
    --wood-dark: #2c1d14;
    --wood-mid: #4a2f20;
    --wood-light: #6e4a31;
    --wood-edge: #8a6244;
    --gold: #c9a35e;
    --gold-soft: #e3c98c;
    --paper: #efe6d6;
    --paper-2: #e3d8c4;
    --ink: #2c2420;
    --ink-soft: #6f655c;

    --c-essay: #3c5a48;
    --c-business: #2f4360;
    --c-philosophy: #52455f;
    --c-manga: #bb8a35;
    --c-other: #5e4c3c;

    --p-theater: #9c7a2e;
    --p-netflix: #a31f27;
    --p-amazon: #3f6ea0;
    --p-unext: #5d3a78;
    --p-other: #6b6258;

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--paper);
    background: radial-gradient(120% 80% at 50% -10%, #2a1f18 0%, var(--wall) 45%, var(--wall-2) 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .room {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 100px;
    position: relative;
  }

  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, var(--wall) 100%);
  }
  .hero-content {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
  }
  .hero-content .tabs {
    margin: 0;
  }
  .plate {
    display: inline-block;
  padding: 10px 28px;
  }
  .plate h1 {
    margin: 0;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  font-size: 26px;
  letter-spacing: .4em;
  transform: scaleX(0.85);
  color: #ffffff;
  }

  /* ---------- Ambient flicker ---------- */
  @keyframes flicker {
    0%, 100% { opacity: .8; }
    50% { opacity: 1; }
  }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 14px 0 8px;
    position: relative;
    z-index: 4;
  }
  .tab {
   font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: .25em;
  transform: scaleX(0.9);
  background: none;
  border: none;
  padding: 8px 4px 10px;
  cursor: pointer;
  position: relative;
  color: #cbbfae;
  transition: color .25s;
  }
  .tab::after {
    content: '';
    position: absolute;
    left: 50%; bottom: 0;
    width: 0%; height: 2px;
    background: var(--gold);
    transform: translateX(-50%);
    transition: width .3s;
  }
  .tab.active { color: var(--gold-soft); }
  .tab.active::after { width: 70%; }

  /* ---------- Legend ---------- */
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px 16px;
    font-size: 11px;
    color: #b9ad9b;
    margin-bottom: 18px;
    letter-spacing: .04em;
    position: relative;
    z-index: 4;
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { width: 11px; height: 11px; border-radius: 2px; display: inline-block; box-shadow: inset 0 0 0 1px rgba(255,255,255,.15); }

  /* ---------- Cabinet / shelf area ---------- */
  .cabinet {
    position: relative;
    border: 10px solid var(--wood-dark);
    border-radius: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.25));
    box-shadow:
      0 18px 40px rgba(0,0,0,.55),
      inset 0 0 0 2px rgba(0,0,0,.4);
    overflow: hidden;

<script>
const genreMeta = {
  novel:      { label: '小説・文学',       color: 'var(--c-novel)' },
  essay:      { label: 'エッセイ・随筆',   color: 'var(--c-essay)' },
  business:   { label: 'ビジネス・実用書', color: 'var(--c-business)' },
  philosophy: { label: '哲学・思想',       color: 'var(--c-philosophy)' },
  manga:      { label: '漫画',             color: 'var(--c-manga)' },
  other:      { label: 'その他',           color: 'var(--c-other)' },
};

const platformMeta = {
  theater: { label: '映画館',       color: 'var(--p-theater)' },
  netflix: { label: 'Netflix',      color: 'var(--p-netflix)' },
  amazon:  { label: 'Prime Video',  color: 'var(--p-amazon)' },
  unext:   { label: 'U-NEXT',       color: 'var(--p-unext)' },
  other:   { label: 'その他',       color: 'var(--p-other)' },
};

let books = [];

let videos = [];

let nextId = 200;
let currentType = 'book';
let editingId = null;  

/* ---------- localStorage ---------- */
const STORAGE_KEY_BOOKS = 'shoko-books';
const STORAGE_KEY_VIDEOS = 'shoko-videos';

function loadData() {
  try {
    const savedBooks = localStorage.getItem(STORAGE_KEY_BOOKS);
    const savedVideos = localStorage.getItem(STORAGE_KEY_VIDEOS);
    if (savedBooks) books = JSON.parse(savedBooks);
    if (savedVideos) videos = JSON.parse(savedVideos);
  } catch (e) {
    console.error('読み込みに失敗しました', e);
  }
  const allIds = [...books, ...videos].map(d => d.id);
  if (allIds.length) nextId = Math.max(...allIds) + 1;
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY_BOOKS, JSON.stringify(books));
    localStorage.setItem(STORAGE_KEY_VIDEOS, JSON.stringify(videos));
  } catch (e) {
    console.error('保存に失敗しました', e);
  }
}

const cabinet = document.getElementById('cabinet');
const legend = document.getElementById('legend');
const formBackdrop = document.getElementById('form-backdrop');
const formSheet = document.getElementById('form-sheet');
const fieldBook = document.getElementById('field-book');
const fieldVideo = document.getElementById('field-video');
const formTitle = document.getElementById('form-title');

function renderLegend() {
  legend.innerHTML = '';
  const meta = currentType === 'book' ? genreMeta : platformMeta;
  Object.values(meta).forEach(m => {
    const span = document.createElement('span');
    span.innerHTML = `<i class="swatch" style="background:${m.color}"></i>${m.label}`;
    legend.appendChild(span);
  });
}

function bookGradient(item) {
  return `linear-gradient(160deg, ${genreMeta[item.genre].color}, rgba(0,0,0,.35))`;
}

function makeBookEl(item) {
  const el = document.createElement('div');
  el.className = 'item book';
  el.dataset.id = item.id;
  const seed = item.id * 9301 % 233;
  const width = 30 + (seed % 18);
  const height = 88 + (seed % 10);
  el.style.width = width + 'px';
  el.style.height = height + '%';
  el.style.background = bookGradient(item);
  el.textContent = item.title;
  return el;
}

function makeDvdEl(item) {
  const el = document.createElement('div');
  el.className = 'item dvd';
  el.dataset.id = item.id;
  if (item.poster) {
    el.style.padding = '0';
    el.style.backgroundImage = `url(${item.poster})`;
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = 'center';
    el.innerHTML = `
      <div class="tag" style="background:${platformMeta[item.platform].color}; margin:8px;">${platformMeta[item.platform].label}</div>
    `;
  } else {
    el.innerHTML = `
      <div class="spine-line"></div>
      <div class="title">${item.title}</div>
      <div class="tag" style="background:${platformMeta[item.platform].color}">${platformMeta[item.platform].label}</div>
    `;
  }
  return el;
}

function renderCabinet() {
  cabinet.innerHTML = '';
  const data = currentType === 'book' ? books : videos;
  const capacity = currentType === 'book' ? 6 : 3;
  const shelvesNeeded = Math.max(2, Math.ceil(data.length / capacity) + 1);

  for (let s = 0; s < shelvesNeeded; s++) {
    const shelf = document.createElement('div');
    shelf.className = 'shelf';

    const row = document.createElement('div');
    row.className = 'row';

    const chunk = data.slice(s * capacity, (s + 1) * capacity);
    if (chunk.length === 0) {
      const note = document.createElement('div');
      note.className = 'empty-note';
      note.textContent = '— ここに増えていく —';
      row.appendChild(note);
    } else {
      chunk.forEach(item => {
        const el = currentType === 'book' ? makeBookEl(item) : makeDvdEl(item);
        row.appendChild(el);
      });
    }

    shelf.appendChild(row);

    const plank = document.createElement('div');
    plank.className = 'plank';
    shelf.appendChild(plank);

    cabinet.appendChild(shelf);
  }
}

/* ---------- Flip / cover animation ---------- */
function buildCoverCard(item, type) {
  const card = document.createElement('div');
  card.className = 'cover-card';

  let bg, accentColor, badgeLabel, metaHTML;
  if (type === 'book') {
    bg = bookGradient(item);
    accentColor = genreMeta[item.genre].color;
    badgeLabel = genreMeta[item.genre].label;
    metaHTML = `<span>${item.author || '—'}</span><span>${item.date || ''}</span>`;
  } else {
   bg = item.poster ? `url(${item.poster}) center/cover` : 'linear-gradient(160deg, #2a323e 0%, #1c222b 100%)';
    accentColor = platformMeta[item.platform].color;
    badgeLabel = platformMeta[item.platform].label;
    metaHTML = `<span>${item.date || ''}</span>`;
  }

  const decor = type === 'book' ? `
      <div class="cover-frame"></div>
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>` : '';
  const titleRule = type === 'book' ? '<div class="title-rule"></div>' : '';

  card.innerHTML = `
    <div class="cover-card-inner">
      <div class="cover-accent" style="background:${accentColor}"></div>${decor}
      <button class="cover-close">✕</button>
      <div class="cover-actions">
  <button class="cover-edit">編集</button>
  <button class="cover-delete">削除</button>
</div>
      <div class="cover-main">
        <h2>${item.title}</h2>
        ${titleRule}
        <div class="cover-meta-row">${metaHTML}</div>
        <div class="cover-badge" style="border-color:${accentColor}">${badgeLabel}</div>
      </div>
    </div>
    <div class="cover-comment-panel">
      <button class="comment-toggle">感想を見る</button>
      <div class="comment-body">
        <div class="text">${item.comment || '（感想はまだありません）'}</div>
      </div>
    </div>
  `;
  card.querySelector('.cover-card-inner').style.background =
    `radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.4) 100%), ${bg}`;
  return card;
}

function openItem(el, item, type) {
  const rect = el.getBoundingClientRect();
  el.classList.add('hidden');

  const overlay = document.createElement('div');
  overlay.className = 'flip-overlay';

  const card = buildCoverCard(item, type);
  card.style.left = rect.left + 'px';
  card.style.top = rect.top + 'px';
  card.style.width = rect.width + 'px';
  card.style.height = rect.height + 'px';
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  const panel = card.querySelector('.cover-comment-panel');
  const toggle = card.querySelector('.comment-toggle');
  toggle.addEventListener('click', () => {
    panel.classList.toggle('open');
  });

  function close() {
    panel.classList.remove('open');
    card.style.left = rect.left + 'px';
    card.style.top = rect.top + 'px';
    card.style.width = rect.width + 'px';
    card.style.height = rect.height + 'px';
    overlay.classList.remove('show');
    card.classList.remove('show');
    const onEnd = (ev) => {
      if (ev.propertyName === 'width') {
        overlay.remove();
        el.classList.remove('hidden');
        card.removeEventListener('transitionend', onEnd);
      }
    };
    card.addEventListener('transitionend', onEnd);
  }

  card.querySelector('.cover-close').addEventListener('click', close);
  card.querySelector('.cover-edit').addEventListener('click', () => {
  close();
  const isBook = type === 'book';
  formTitle.textContent = isBook ? '本を編集する' : '映画・ドラマを編集する';
  fieldBook.style.display = isBook ? 'block' : 'none';
  fieldVideo.style.display = isBook ? 'none' : 'block';
  entryForm.title.value = item.title;
  if (isBook) {
    entryForm.author.value = item.author || '';
    entryForm.genre.value = item.genre;
  } else {
    entryForm.platform.value = item.platform;
  }
  entryForm.date.value = item.date || '';
  entryForm.comment.value = item.comment || '';
  editingId = item.id;
  formSheet.classList.add('open');
  formBackdrop.classList.add('open');
});

card.querySelector('.cover-delete').addEventListener('click', () => {
  if (!confirm(`「${item.title}」を削除しますか？`)) return;
  if (type === 'book') {
    books = books.filter(b => b.id !== item.id);
  } else {
    videos = videos.filter(v => v.id !== item.id);
  }
  saveData();
  renderCabinet();
  overlay.remove();
});
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) close();
  });

  requestAnimationFrame(() => {
    overlay.classList.add('show');
    card.classList.add('show');
    const vw = window.innerWidth, vh = window.innerHeight;
    const w = Math.min(vw * 0.8, 380);
    const h = Math.min(vh * 0.68, 580);
    card.style.left = ((vw - w) / 2) + 'px';
    card.style.top = ((vh - h) / 2) + 'px';
    card.style.width = w + 'px';
    card.style.height = h + 'px';
  });
}

cabinet.addEventListener('click', (e) => {
  const el = e.target.closest('.item');
  if (!el) return;
  const id = Number(el.dataset.id);
  const data = currentType === 'book' ? books : videos;
  const item = data.find(d => d.id === id);
  if (item) openItem(el, item, currentType);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    renderLegend();
    renderCabinet();
  });
});

/* ---- add form ---- */
const fab = document.getElementById('fab');
const formCancel = document.getElementById('form-cancel');
const entryForm = document.getElementById('entry-form');

fab.addEventListener('click', () => {
  const isBook = currentType === 'book';
  formTitle.textContent = isBook ? '本を記録する' : '映画・ドラマを記録する';
  fieldBook.style.display = isBook ? 'block' : 'none';
  fieldVideo.style.display = isBook ? 'none' : 'block';
  entryForm.reset();
  editingId = null;
  formSheet.classList.add('open');
  formBackdrop.classList.add('open');
});

formCancel.addEventListener('click', () => {
  formSheet.classList.remove('open');
  formBackdrop.classList.remove('open');
});

formBackdrop.addEventListener('click', () => {
  formSheet.classList.remove('open');
  formBackdrop.classList.remove('open');
});
  let currentPosterData = null;

document.getElementById('poster-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  const preview = document.getElementById('poster-preview');
  if (!file) {
    currentPosterData = null;
    preview.innerHTML = '';
    return;
  }
  preview.innerHTML = '読み込み中…';
  try {
    currentPosterData = await compressImage(file);
    preview.innerHTML = `<img src="${currentPosterData}" style="max-width:120px; border-radius:4px;">`;
  } catch (err) {
    console.error(err);
    preview.innerHTML = '画像の読み込みに失敗しました';
    currentPosterData = null;
  }
});

entryForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const fd = new FormData(entryForm);
  const title = fd.get('title').trim();
  if (!title) return;

  if (editingId !== null) {
    if (currentType === 'book') {
      const idx = books.findIndex(b => b.id === editingId);
      if (idx !== -1) books[idx] = { id: editingId, title, author: fd.get('author').trim(), genre: fd.get('genre'), date: fd.get('date'), comment: fd.get('comment').trim() };
    } else {
      const idx = videos.findIndex(v => v.id === editingId);
      if (idx !== -1) videos[idx] = { id: editingId, title, platform: fd.get('platform'), date: fd.get('date'), comment: fd.get('comment').trim(), poster: currentPosterData || (videos[idx] ? videos[idx].poster : null) };
    }
      editingId = null;
  } else {
    if (currentType === 'book') {
      books.push({ id: nextId++, title, author: fd.get('author').trim(), genre: fd.get('genre'), date: fd.get('date'), comment: fd.get('comment').trim() });
    } else {
      videos.push({ id: nextId++, title, platform: fd.get('platform'), date: fd.get('date'), comment: fd.get('comment').trim(), poster: currentPosterData });
  }
}
  entryForm.reset();
  formSheet.classList.remove('open');
  formBackdrop.classList.remove('open');
  saveData();
  renderCabinet();
});

  /* ---------- 画像圧縮 ---------- */
function compressImage(file, maxSize = 400, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width;
        let h = img.height;
        if (w > h && w > maxSize) {
          h = Math.round(h * (maxSize / w));
          w = maxSize;
        } else if (h > maxSize) {
          w = Math.round(w * (maxSize / h));
          h = maxSize;
        }
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
/* ---------- 保存 / 復元 ---------- */
function exportData() {
  const data = {
    books: books,
    videos: videos,
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `watashino-shoka-backup-${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.books) || !Array.isArray(data.videos)) {
        alert('このファイルは正しいバックアップ形式ではないようです。');
        return;
      }
      const ok = confirm(
        `本 ${data.books.length}件、映像 ${data.videos.length}件を復元します。\n` +
        `今のデータは上書きされます。よろしいですか？`
      );
      if (!ok) return;

      books = data.books;
      videos = data.videos;
      const allIds = [...books, ...videos].map(d => d.id);
      nextId = allIds.length ? Math.max(...allIds) + 1 : 200;

      saveData();
      renderCabinet();
      alert('復元が完了しました。');
    } catch (err) {
      console.error(err);
      alert('ファイルの読み込みに失敗しました。JSON形式を確認してください。');
    }
  };
  reader.readAsText(file);
}

document.getElementById('export-btn').addEventListener('click', exportData);

const importBtn = document.getElementById('import-btn');
const importFileInput = document.getElementById('import-file-input');
importBtn.addEventListener('click', () => importFileInput.click());
importFileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) importData(file);
  importFileInput.value = '';
});
/* ---- init ---- */
loadData();
document.querySelector('.tab[data-type="book"]').classList.add('active');
renderLegend();
renderCabinet();
(function () {
  const splash = document.getElementById('splash-screen');
  if (!splash) return;
  setTimeout(() => {
    splash.classList.add('hide');
    setTimeout(() => {
      splash.classList.add('done');
      setTimeout(() => splash.remove(), 300);
    }, 600);
  }, 800);
})();
</script>
